        'background:' + (isActive ? s.bg : 'transparent') + ';' +
        'font-weight:' + (isActive ? 'bold' : 'normal') + ';">' +
        s.icon + ' ' + s.tab + '</button>';
    }
    tabsEl.innerHTML = tabHTML;
    var tabBtns = tabsEl.querySelectorAll(".tab-btn");
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener("click", (function(id) {
        return function() { activeSection = id; openBlock = null; render(); };
      })(tabBtns[i].dataset.id));
    }

    // Body background
    document.getElementById("body").style.background = current.bg;

    // Build inner HTML
    var html = '<div style="margin-bottom:20px">' +
      '<div class="section-title" style="color:' + current.color + '">' + current.title + '</div>' +
      '<div class="section-subtitle">' + current.subtitle + '</div>' +
      '</div>';

    if (current.sectionWisdom) {
      html += '<div class="wisdom-banner" style="background:' + current.color + '">' +
        '<div class="qdash">&ldquo;</div>' +
        '<p>' + current.sectionWisdom + '</p>' +
        '</div>';
    }

    if (current.id !== "refs") {
      for (var bi = 0; bi < current.blocks.length; bi++) {
        var block = current.blocks[bi];
        var isOpen = openBlock === bi;

        var listHTML = "";
        for (var li = 0; li < block.list.length; li++) {
          listHTML += '<div class="item-row">' +
            '<div class="item-bar" style="background:' + current.color + '"></div>' +
            '<div><span class="item-label" style="color:' + current.color + '">' + block.list[li].label + ': </span>' +
            '<span class="item-detail">' + block.list[li].detail + '</span></div>' +
            '</div>';
        }

        html += '<div class="block">' +
          '<button class="block-btn' + (isOpen ? ' open' : '') + '" data-bi="' + bi + '" style="' +
            'border: 1.5px solid ' + (isOpen ? current.color : 'rgba(0,0,0,0.1)') + ';' +
            'background:' + (isOpen ? '#fff' : 'rgba(255,255,255,0.6)') + ';">' +
          '<div>' +
            '<div class="block-heading" style="color:' + current.color + '">' + block.heading + '</div>' +
            '<div class="block-meta">' + block.list.length + ' components &middot; tap to expand</div>' +
          '</div>' +
          '<div class="chevron" style="color:' + current.color + '">' + (isOpen ? '&#9650;' : '&#9660;') + '</div>' +
          '</button>' +
          '<div class="block-body' + (isOpen ? ' open' : '') + '" style="border:1.5px solid ' + current.color + '; border-top:none;">' +
            '<p class="intro">' + block.body + '</p>' +
            '<div class="item-list">' + listHTML + '</div>' +
            '<div class="wisdom-bite" style="border-left:3px solid ' + current.color + '">' +
              '<span class="qm" style="color:' + current.color + '">&ldquo;</span>' +
              '<p>' + block.wisdom + '</p>' +
            '</div>' +
            '<div class="tip-box"><strong>&#128161; Practical tip:</strong> ' + block.tip + '</div>' +
            '<div class="ref-box">&#128218; ' + block.ref + '</div>' +
          '</div>' +
        '</div>';
      }
    } else {
      var priorities = ["Essential", "Important", "Useful"];
      for (var pi = 0; pi < priorities.length; pi++) {
        var priority = priorities[pi];
        var color = priorityColors[priority];
        html += '<div class="ref-group">' +
          '<div class="ref-group-label">' +
            '<div class="ref-dot" style="background:' + color + '"></div>' +
            '<span class="ref-group-name" style="color:' + color + '">' + priority + '</span>' +
          '</div>';
        for (var ri = 0; ri < refs.length; ri++) {
          if (refs[ri].priority === priority) {
            html += '<div class="ref-card" style="border-left-color:' + color + '">' +
              '<div class="ref-card-label" style="color:' + color + '">' + refs[ri].label + '</div>' +
              '<div class="ref-card-citation">' + refs[ri].citation + '</div>' +
              '</div>';
          }
        }
        html += '</div>';
      }
      html += '<div class="where-used"><div class="where-title">Where each reference is used</div>';
      for (var wi = 0; wi < whereUsed.length; wi++) {
        html += '<div class="where-row"><div class="where-tab">' + whereUsed[wi].tab + '</div><div class="where-refs">' + whereUsed[wi].refs + '</div></div>';
      }
      html += '</div>';
    }

    document.getElementById("body-inner").innerHTML = html;

    // Block toggle listeners
    var blockBtns = document.querySelectorAll(".block-btn");
    for (var i = 0; i < blockBtns.length; i++) {
      blockBtns[i].addEventListener("click", (function(bi) {
        return function() { openBlock = openBlock === bi ? null : bi; render(); };
      })(parseInt(blockBtns[i].dataset.bi)));
    }
  }

  render();
</script>
</body>
</html>
